spring.application.name=quanlysinhvien

# Port: Railway tự set PORT, fallback về 8080
server.port=${PORT:8080}

# ===== DATABASE =====
# Khi chạy local: dùng localhost
# Khi deploy Railway: Railway tự inject MYSQL_HOST, MYSQLUSER, MYSQL_ROOT_PASSWORD, MYSQL_DATABASE
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:quanlysinhvien2}?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:4326}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== THYMELEAF =====
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
